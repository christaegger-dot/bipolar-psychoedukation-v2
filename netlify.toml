[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;"

# Handout-Infografiken: Im Browser anzeigen (Vorschau)
[[headers]]
  for = "/handouts/*.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "inline"
    Cache-Control = "public, max-age=604800"

# Handout-Textversionen: Download erzwingen
[[headers]]
  for = "/handouts-text/*.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "inline"
    Cache-Control = "public, max-age=604800"

# Download-Vorlagen: Download erzwingen
[[headers]]
  for = "/downloads/*.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Content-Disposition = "attachment"

[[headers]]
  for = "/shared.css"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/handouts-legacy/*.pdf"
  [headers.values]
    Content-Type = "application/pdf"
    Cache-Control = "public, max-age=604800"

[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = true

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.images]
  compress = false

[template.environment]
  EMAIL_OBFUSCATION = "off"

# 404 Custom Error Page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
